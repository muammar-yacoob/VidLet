<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VidLet</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:#18181b;font-family:'Segoe UI',sans-serif;color:#e4e4e7;display:flex;flex-direction:row}
  body.fade-out{opacity:0;transition:opacity .3s}
  .preview{width:120px;min-width:120px;height:100%;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #lottieBox{width:110px;height:110px}
  .placeholder{color:#333;font-size:32px}
  .info{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;min-width:0}
  .row{display:flex;align-items:center;gap:8px}
  .icon{width:22px;height:22px}
  .title{font-size:12px;font-weight:600;color:#a855f7}
  .status{font-size:11px;color:#a1a1aa;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .result{font-size:11px;color:#22c55e;margin-top:6px;display:none}
  .bar{width:100%;height:3px;background:#27272a;border-radius:2px;margin-top:8px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,#a855f7,#c084fc);width:5%;transition:width .2s}
</style>
</head>
<body>
  <div class="preview">
    <div class="placeholder" id="placeholder">&#9654;</div>
    <div id="lottieBox" style="display:none"></div>
  </div>
  <div class="info">
    <div class="row">
      <img class="icon" src="tv.png" onerror="this.style.display='none'">
      <div class="title">Optimizing Lottie</div>
    </div>
    <div class="status" id="status">Processing...</div>
    <div class="result" id="result"></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
  </div>
<script src="lottie_light.min.js"></script>
<script>
(function() {
  var currentAnim = null;
  var lastAnimHash = '';
  var animPct = 5;
  var isDone = false;

  function loadAnim(jsonStr) {
    // Simple hash to detect changes
    var hash = jsonStr.length + '_' + jsonStr.charCodeAt(0) + '_' + jsonStr.charCodeAt(100);
    if (hash === lastAnimHash) return;
    lastAnimHash = hash;

    try {
      var data = JSON.parse(jsonStr);
      if (currentAnim) { currentAnim.destroy(); currentAnim = null; }
      var box = document.getElementById('lottieBox');
      box.innerHTML = '';
      box.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      currentAnim = lottie.loadAnimation({
        container: box,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        animationData: data
      });
    } catch(e) {}
  }

  function poll() {
    if (isDone) return;
    fetch('/api/state').then(function(r) { return r.json(); }).then(function(s) {
      // Animation preview
      if (s.animationJson) {
        loadAnim(s.animationJson);
      }

      // Progress
      if (s.progress) {
        var c = s.progress.current, t = s.progress.total, fn = s.progress.fileName;
        var pct = Math.round(((c - 1) / t) * 90) + 5;
        document.getElementById('fill').style.width = pct + '%';
        animPct = pct;
        document.getElementById('status').innerText = t > 1
          ? c + '/' + t + '  ' + fn : fn;
      } else if (animPct < 90) {
        animPct += 1;
        document.getElementById('fill').style.width = animPct + '%';
      }

      // Done
      if (s.doneMessage) {
        isDone = true;
        document.getElementById('fill').style.width = '100%';
        document.getElementById('status').style.display = 'none';
        var res = document.getElementById('result');
        res.innerText = s.doneMessage;
        res.style.display = 'block';
        setTimeout(function() {
          document.body.className = 'fade-out';
          setTimeout(function() { window.close(); }, 400);
        }, 3500);
        return;
      }

      setTimeout(poll, 200);
    }).catch(function() {
      setTimeout(poll, 500);
    });
  }

  poll();
})();
</script>
</body>
</html>
