<!DOCTYPE html>
<html data-vidlet data-width="400" data-height="400">
<head>
  <meta charset="UTF-8">
  <title>VidLet - Speedup</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <div class="app">
    <div class="hd">
      <b>VidLet</b>
      <span>Speedup Video</span>
    </div>

    <div class="meta" id="meta">
      <div>File: <b id="fileName">-</b></div>
      <div>Size: <b id="size">-</b></div>
      <div>Duration: <b id="duration">-</b></div>
    </div>

    <div class="form" id="form">
      <div class="row" data-tip="Playback speed multiplier (e.g., 1.5 = 50% faster)">
        <label>Speed</label>
        <input type="number" id="speed" min="0.25" max="4" step="0.05" value="1.5">
        <span>x</span>
      </div>

      <div class="row" data-tip="Pitch adjustment in percent (negative = lower pitch)">
        <label>Pitch</label>
        <input type="number" id="pitchShift" min="-5" max="5" step="0.01" value="-0.03">
        <span>%</span>
      </div>

      <div class="warn-box" id="warn"></div>

      <div class="meta" style="padding-top:8px">
        <div>New Duration: <b id="newDuration">-</b></div>
        <div>Pitch: <b id="pitchLabel">-</b></div>
      </div>
    </div>

    <div class="ld" id="loading">
      <div class="sp"></div>
      <span>Speeding up video...</span>
    </div>

    <div class="log" id="log"></div>

    <div class="dn" id="done">
      <h4>Done!</h4>
      <p id="output"></p>
      <div class="btns" style="margin-top:12px;width:100%">
        <button class="btn btn-p" onclick="VidLet.close()">Close</button>
      </div>
    </div>

    <div class="btns" id="btns">
      <button class="btn btn-g" onclick="VidLet.cancel()">Cancel</button>
      <button class="btn btn-p" onclick="process()">Speedup</button>
    </div>
  </div>

  <script src="/js/vidlet.js"></script>
  <script>
    const { $, log, postJson, setLoading, showDone, formatDuration } = VidLet;
    let info = {};

    async function init() {
      const res = await VidLet.fetchJson('/api/info');
      info = res;
      $('fileName').textContent = res.fileName;
      $('size').textContent = `${res.width}x${res.height}`;
      $('duration').textContent = formatDuration(res.duration);

      if (res.defaults) {
        if (res.defaults.speed) $('speed').value = res.defaults.speed;
        if (res.defaults.pitchShift !== undefined) $('pitchShift').value = res.defaults.pitchShift;
      }

      $('speed').oninput = updatePreview;
      $('pitchShift').oninput = updatePreview;
      updatePreview();
    }

    function updatePreview() {
      const speed = parseFloat($('speed').value);
      const pitch = parseFloat($('pitchShift').value);
      const newDur = info.duration / speed;

      $('newDuration').textContent = formatDuration(newDur);
      $('pitchLabel').textContent = `${pitch > 0 ? '+' : ''}${pitch}%`;

      if (Math.abs(pitch) > 1) {
        $('warn').textContent = `Pitch shift of ${pitch}% is unusually high. Voice will sound noticeably ${pitch < 0 ? 'deeper' : 'higher'}.`;
        $('warn').classList.add('on');
      } else {
        $('warn').classList.remove('on');
      }
    }

    async function process() {
      setLoading(true, 'Speeding up video...');

      const opts = {
        speed: parseFloat($('speed').value),
        pitchShift: parseFloat($('pitchShift').value)
      };

      try {
        const res = await postJson('/api/process', opts);

        if (res.logs) {
          res.logs.forEach(l => log('log', l.type === 'error' ? 'e' : l.type === 'success' ? 's' : 'i', l.message));
        }

        if (res.success) {
          showDone(true, 'Speedup Complete!', res.output);
        } else {
          showDone(false, 'Speedup Failed', res.error);
        }
      } catch (err) {
        showDone(false, 'Error', err.message);
      }
    }

    init();
  </script>
</body>
</html>
